name: Deploy docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun build src/cli/index.ts --outfile dist/ice.mjs --target bun
      - run: cd docs && bun run ../dist/ice.mjs build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site
      - id: deployment
        uses: actions/deploy-pages@v4
